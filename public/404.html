<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Sector Not Found</title>
  <meta name="description" content="The gaming sector you are trying to access doesn't exist. Return to Beast Arena.">
  <link rel="stylesheet" href="/index.css?v=1.5">
  <script src="/nav.js" defer></script>
</head>
<body class="auth-page">
  <div class="auth-container" style="justify-content: center; align-items: center; min-height: 100vh; padding: 2rem;">
    <div class="auth-card" style="text-align: center; max-width: 460px; width: 100%; padding: 3rem 2rem;">
      <div style="font-size: 6.5rem; font-weight: 900; line-height: 1; margin-bottom: 1rem; background: linear-gradient(135deg, var(--accent) 30%, #ec4899 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 2px 10px var(--accent-glow)); font-family: system-ui, -apple-system, sans-serif;">404</div>
      <h2 style="font-size: 1.75rem; font-weight: 850; letter-spacing: -0.03em; margin-bottom: 0.75rem;">Lost in the Arena</h2>
      <p style="color: var(--fg-muted); margin-bottom: 2rem; line-height: 1.6; font-size: 0.95rem;">The sector you are trying to access doesn't exist, has been archived, or was wiped during the last system reset.</p>
      
      <div style="display: flex; flex-direction: column; gap: 0.85rem; width: 100%;">
        <button id="google-404-btn" type="button" class="auth-submit-btn" style="display: flex; align-items: center; justify-content: center; gap: 0.75rem; width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--fg); font-weight: 700; cursor: pointer; transition: all 0.2s ease;">
          <svg style="width:18px;height:18px;" viewBox="0 0 24 24"><path fill="#EA4335" d="M12 5.04c1.66 0 3.2.57 4.38 1.69l3.27-3.27C17.68 1.54 15.03 1 12 1 7.37 1 3.41 3.66 1.48 7.56l3.96 3.07C6.39 7.42 9.01 5.04 12 5.04z"/><path fill="#4285F4" d="M23.49 12.27c0-.81-.07-1.59-.2-2.36H12v4.51h6.46c-.29 1.48-1.14 2.74-2.4 3.58l3.76 2.91c2.2-2.03 3.67-5.02 3.67-8.64z"/><path fill="#FBBC05" d="M5.44 14.47c-.24-.71-.38-1.47-.38-2.27s.14-1.56.38-2.27L1.48 7.56C.54 9.36 0 11.38 0 13.5s.54 4.14 1.48 5.94l3.96-3.07z"/><path fill="#34A853" d="M12 18.96c2.8 0 5.16-.92 6.88-2.51l-3.76-2.91c-1.04.7-2.38 1.12-3.12 1.12-2.99 0-5.61-2.38-6.56-5.59L1.48 12.14C3.41 19.34 7.37 23 12 23z"/></svg>
          Login with Google
        </button>
        <a href="/" class="auth-submit-btn" style="display: flex; align-items: center; justify-content: center; width: 100%; text-decoration: none; font-weight: 700; background: linear-gradient(135deg, var(--accent) 0%, #b814b8 100%); color: #ffffff; border: none; box-shadow: var(--accent-glow) 0 4px 14px; transition: all 0.2s ease;">
          Return to Dashboard
        </a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('google-404-btn').addEventListener('click', () => {
      window.location.href = '/api/auth/google/login';
    });
  </script>
</body>
</html>
